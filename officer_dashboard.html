<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Officer Dashboard | SamurdhiSaviya</title>
  <meta name="description" content="Samurdhi officer dashboard for managing field visits and approvals.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/gn_dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Global Theme CSS and JS -->
  <link rel="stylesheet" href="assets/css/theme.css">
  <script src="assets/js/theme.js"></script>
</head>
<body>
  <main class="gn-shell">
    <header class="gn-header">
      <a class="brand" href="index.html" aria-label="SamurdhiSaviya home">
        <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-landmark"></i></span>
        <span class="brand-text">
          <strong>SamurdhiSaviya</strong>
          <small>Officer Portal</small>
        </span>
      </a>

      <div class="user-chip">Welcome, Samurdhi Officer</div>
    </header>

    <section class="gn-hero">
      <p class="eyebrow">Officer dashboard</p>
      <h1>Manage field visits and review workflows from one place.</h1>
      <p class="hero-copy">
        Continue to the visit record screen or move through the approval workflow as required.
      </p>
    </section>

    <section class="metrics-grid" aria-label="Officer actions">
      <a class="metric-card" href="record_visit.html?applicant_id=1">
        <span class="metric-icon"><i class="fa-solid fa-house-medical"></i></span>
        <p>Record Home Visit</p>
        <strong>Visit</strong>
      </a>

      <a class="metric-card" href="gn_applications.html">
        <span class="metric-icon"><i class="fa-solid fa-file-circle-check"></i></span>
        <p>View Division Queue</p>
        <strong>Review</strong>
      </a>
    </section>
  </main>
</body>
</html>
